name: Cloud Paper Trading Tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: cloud-paper-trading-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call the production tick endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error --retry 2 --max-time 240 \
            -H "x-cron-secret: $CRON_SECRET" \
            "https://coin-mvp-cloud.vercel.app/api/tick"
